<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwaaFotoes Studio By Afgan </title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* =====================================================================
           CSS SECTION - TOTAL 350+ LINES OF STYLING
           =====================================================================
        */
        :root {
            --p-gold: #c39366;
            --p-dark: #121212;
            --p-white: #ffffff;
            --p-border: #f0f0f0;
            --p-gray: #f8f8f8;
            --p-soft: rgba(0,0,0,0.05);
            --p-glass: rgba(255, 255, 255, 0.95);
            --ease-main: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-out-back: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--p-white);
            background-image: 
                radial-gradient(var(--p-gold) 0.8px, transparent 0.8px),
                linear-gradient(to right, #fafafa 1px, transparent 1px),
                linear-gradient(to bottom, #fafafa 1px, transparent 1px);
            background-size: 30px 30px, 100px 100px, 100px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--p-dark);
        }

        /* --- UI ANIMATIONS --- */
        @keyframes fadeUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes shutterFlash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes pulseGold {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(195, 147, 102, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(195, 147, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(195, 147, 102, 0); }
        }

        @keyframes stickerFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        @keyframes rotating {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ani-fade { animation: fadeUp 0.8s var(--ease-out-back) forwards; }
        .ani-flash { animation: shutterFlash 0.3s ease-in-out forwards; }
        .ani-pulse { animation: pulseGold 2s infinite; }
        .ani-sticker { animation: stickerFloat 4s ease-in-out infinite; }
        .ani-spin { animation: rotating 5s linear infinite; }

        /* --- HEADER & MUSIC --- */
        .header-container {
            margin-top: 60px;
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        .header-container h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--p-dark);
            margin-bottom: 5px;
        }

        .header-container span {
            font-size: 12px;
            font-weight: 800;
            color: var(--p-gold);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .music-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--p-white);
            padding: 10px 25px;
            border-radius: 100px;
            box-shadow: 0 15px 35px var(--p-soft);
            margin-bottom: 35px;
            border: 1px solid var(--p-border);
            cursor: pointer;
            transition: 0.3s;
        }

        .music-bar:hover { transform: translateY(-3px); box-shadow: 0 20px 40px var(--p-soft); }

        .music-toggle-btn {
            width: 38px;
            height: 38px;
            background: var(--p-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-toggle-btn img {
            width: 16px;
            filter: invert(1);
        }

        .music-text {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- VIEWPORT ENGINE --- */
        .studio-viewport {
            width: 90%;
            max-width: 400px;
            background: var(--p-white);
            padding: 15px;
            border-radius: 45px;
            box-shadow: 0 40px 120px rgba(0,0,0,0.12);
            position: relative;
        }

        .studio-screen {
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
        }

        #studio-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.4s var(--ease-main);
        }

        #countdown-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        #countdown-number {
            font-size: 180px;
            font-weight: 800;
            color: var(--p-white);
            text-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* --- BAKING PROGRESS OVERLAY --- */
        #BAKING-overlay {
            position: fixed;
            inset: 0;
            background: var(--p-glass);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100000;
        }

        .BAKING-progress-box {
            width: 280px;
            text-align: center;
        }

        .BAKING-bar-track {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 20px;
            margin-top: 30px;
            overflow: hidden;
        }

        .BAKING-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--p-gold);
            transition: width 0.5s ease;
        }

        /* --- RESULT ARCHITECTURE --- */
        #result-stage {
            position: fixed;
            inset: 0;
            background: var(--p-white);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 60px 0;
        }

        .polaroid-master {
            width: 330px;
            background: var(--p-white);
            padding: 22px 22px 130px;
            position: relative;
            box-shadow: 0 60px 150px rgba(0,0,0,0.15);
            border: 1px solid var(--p-border);
        }

        .photo-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--p-gray);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .frame-slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s var(--ease-main);
        }

        .frame-slide.active { opacity: 1; }

        .branding-group {
            position: absolute;
            bottom: 40px;
            right: 25px;
            text-align: right;
        }

        .branding-title { font-size: 25px; font-weight: 800; display: block; }
        .branding-tag { font-size: 11px; color: var(--p-gold); font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
        .date-text { position: absolute; bottom: 40px; left: 25px; font-size: 12px; font-weight: 700; opacity: 0.6; }

        .sticker {
            position: absolute;
            top: -25px;
            width: 75px;
            z-index: 100;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.15));
        }

        /* --- CONTROLS --- */
        .sidebar-nav {
            position: fixed;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
        }

        .nav-item {
            width: 62px;
            height: 62px;
            background: var(--p-white);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px var(--p-soft);
            cursor: pointer;
            border: 1px solid var(--p-border);
            transition: 0.3s var(--ease-out-back);
        }

        .nav-item:active { transform: scale(0.85); }
        .nav-item img { width: 28px; opacity: 0.8; }

        .main-btn {
            width: 85%;
            max-width: 350px;
            padding: 24px;
            background: var(--p-dark);
            color: var(--p-white);
            border-radius: 100px;
            border: none;
            font-weight: 800;
            letter-spacing: 3px;
            margin-top: 40px;
            text-transform: uppercase;
            font-size: 14px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        .btn-save { background: var(--p-gold); box-shadow: 0 20px 45px rgba(195, 147, 102, 0.4); }

        /* --- FILTER DRAWER --- */
        #filter-drawer {
            position: fixed;
            bottom: -650px;
            left: 0;
            width: 100%;
            background: var(--p-white);
            padding: 50px 40px;
            border-radius: 50px 50px 0 0;
            box-shadow: 0 -25px 80px rgba(0,0,0,0.12);
            transition: 0.7s var(--ease-out-back);
            z-index: 10000;
        }

        .filter-option {
            padding: 22px;
            background: #fafafa;
            border-radius: 25px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 800;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .filter-option.active {
            background: var(--p-dark);
            color: var(--p-white);
        }

        #flash-effect {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 999999;
        }

        canvas { display: none; }
    </style>
</head>

<body>
    <div id="flash-effect"></div>

    <div id="BAKING-overlay">
        <img src="pindah1.png" class="ani-spin" style="width: 70px; margin-bottom: 25px;">
        <div class="BAKING-progress-box">
            <h2 style="font-weight: 800; letter-spacing: 1px;">MAKE STUDIO QUALITY</h2>
            <p id="BAKING-status-text" style="font-size: 11px; color: var(--p-gold); font-weight: 700; margin-top: 10px; text-transform: uppercase;">Injecting Filters 0%</p>
            <div class="BAKING-bar-track">
                <div class="BAKING-bar-fill" id="BAKING-progress-fill"></div>
            </div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-item ani-fade" style="animation-delay: 0.1s;" onclick="UI.openFilters()"><img src="adjust.png"></div>
        <div class="nav-item ani-fade" style="animation-delay: 0.2s;" onclick="Engine.flip()"><img src="flip.png"></div>
        <div class="nav-item ani-fade" style="animation-delay: 0.3s;" onclick="location.reload()"><img src="retry.png"></div>
    </nav>

    <main id="capture-scene" style="display:flex; flex-direction:column; align-items:center; width:100%;">
        <div class="header-container ani-fade">
            <span>SwaaFotoes Studio</span>
            <h1>SwaaFotoes</h1>
        </div>

        <div class="music-bar ani-fade" onclick="Music.toggle()">
            <div class="music-toggle-btn">
                <img id="music-icon" src="play.png">
            </div>
            <span class="music-text" id="music-label">Studio Playlist: Off</span>
            <audio id="audio-element" loop src="musik.mp3"></audio>
        </div>

        <div class="studio-viewport ani-fade">
            <div class="studio-screen">
                <video id="studio-video" autoplay playsinline></video>
                <div id="countdown-overlay"><span id="countdown-number">3</span></div>
            </div>
        </div>

        <button class="main-btn ani-fade" id="trigger-btn" onclick="Engine.startCaptureCycle()">
            START SESSION 1/4
        </button>
    </main>

    <section id="result-stage">
        <div class="polaroid-master ani-fade" id="target-polaroid">
            <img class="sticker ani-sticker" id="stk-left" src="pindah1.png" style="left: -20px;">
            <img class="sticker ani-sticker" id="stk-right" src="pindah1.png" style="right: -20px;">
            
            <div class="photo-container" id="slideshow-wrapper"></div>
            
            <div class="date-text" id="display-date"></div>
            <div class="branding-group">
                <span class="branding-title">SwaaFotoes</span>
                <span class="branding-tag">Studio By Afgan</span>
            </div>
        </div>

        <div style="display:flex; gap:15px; margin-top:40px; align-items:center;" class="ani-fade">
            <div onclick="UI.setBg('#ffffff')" style="width:32px;height:32px;background:#fff;border:1px solid #ddd;border-radius:50%;cursor:pointer;"></div>
            <div onclick="UI.setBg('#000000')" style="width:32px;height:32px;background:#000;border-radius:50%;cursor:pointer;"></div>
            <div onclick="UI.setBg('#ffc0cb')" style="width:32px;height:32px;background:#ffc0cb;border-radius:50%;cursor:pointer;"></div>
            <div onclick="UI.setBg('#a07248')" style="width:32px;height:32px;background:#a07248;border-radius:50%;cursor:pointer;"></div>
            <div style="width:2px; height:25px; background:#eee; margin: 0 10px;"></div>
            <div id="layout-toggle" onclick="Engine.toggleLayout()" style="padding:12px 22px; background:#f0f0f0; border-radius:25px; font-size:11px; font-weight:800; cursor:pointer;">MODE: STRIP</div>
        </div>

        <button class="main-btn btn-save ani-fade" onclick="Engine.bakeFinalImage()">DOWNLOAD HIGH-RES</button>
        <button class="main-btn ani-fade" style="background:none; color:var(--p-dark); border:3px solid var(--p-dark); margin-top:15px;" onclick="location.reload()">RETAKE SESSION</button>
    </section>

    <div id="filter-drawer">
        <h3 style="text-align:center; font-size:12px; letter-spacing:4px; margin-bottom:30px; color:var(--p-gold);">SELECT STUDIO PRESET</h3>
        <div class="filter-option active" onclick="UI.applyFilter('none', this)">NATURAL LOOK</div>
        <div class="filter-option" onclick="UI.applyFilter('vivid', this)">VIVID TITAN</div>
        <div class="filter-option" onclick="UI.applyFilter('mono', this)">STUDIO NOIR</div>
        <div class="filter-option" onclick="UI.applyFilter('pink', this)">SOFT MAGNUM</div>
        <button onclick="UI.openFilters()" style="width:100%; padding:20px; color:red; background:none; border:none; font-weight:800; margin-top:15px; cursor:pointer;">CLOSE DRAWER</button>
    </div>

    <canvas id="bridge-canvas"></canvas>

    <script>
        /**
         * GLOBAL STATE MANAGEMENT
         */
        const STUDIO_STATE = {
            capturedImages: [],
            isFrontCamera: true,
            activeFilterKey: 'none',
            activeLayoutMode: 'STRIP',
            stickerFrame: 1,
            isProcessing: false,
            filterLibrary: {
                none: 'none',
                vivid: 'saturate(1.8) contrast(1.1) brightness(1.05)',
                mono: 'grayscale(1) contrast(1.25) brightness(0.9)',
                pink: 'sepia(0.3) hue-rotate(300deg) saturate(1.9) brightness(1.05)'
            }
        };

        /**
         * MUSIC SYSTEM
         */
        const Music = {
            isPlaying: false,
            toggle() {
                const audio = document.getElementById('audio-element');
                const label = document.getElementById('music-label');
                const icon = document.getElementById('music-icon');

                if(!this.isPlaying) {
                    audio.play().catch(() => alert("Interact with page first to play music"));
                    label.innerText = "Studio Playlist: On";
                    icon.src = "pause.png";
                } else {
                    audio.pause();
                    label.innerText = "Studio Playlist: Off";
                    icon.src = "play.png";
                }
                this.isPlaying = !this.isPlaying;
            }
        };

        /**
         * UI CONTROLLER
         */
        const UI = {
            openFilters() {
                const drawer = document.getElementById('filter-drawer');
                const currentPos = drawer.style.bottom;
                drawer.style.bottom = (currentPos === '0px') ? '-650px' : '0px';
            },

            applyFilter(key, element) {
                document.querySelectorAll('.filter-option').forEach(opt => opt.classList.remove('active'));
                element.classList.add('active');
                
                STUDIO_STATE.activeFilterKey = key;
                const video = document.getElementById('studio-video');
                video.style.filter = STUDIO_STATE.filterLibrary[key];
                
                setTimeout(() => this.openFilters(), 400);
            },

            setBg(color) {
                const card = document.getElementById('target-polaroid');
                card.style.backgroundColor = color;
                // Auto contrast text color
                if(color === '#000000' || color === '#a07248') {
                    card.style.color = '#ffffff';
                } else {
                    card.style.color = '#121212';
                }
            }
        };

        /**
         * CORE ENGINE
         */
        const Engine = {
            async startStream() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            facingMode: STUDIO_STATE.isFrontCamera ? 'user' : 'environment',
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        }
                    });
                    const video = document.getElementById('studio-video');
                    video.srcObject = stream;
                    video.style.transform = STUDIO_STATE.isFrontCamera ? 'scaleX(-1)' : 'none';
                } catch (err) {
                    console.error("Camera Error:", err);
                    alert("Gagal mengakses kamera. Izinkan akses kamera terlebih dahulu.");
                }
            },

            flip() {
                STUDIO_STATE.isFrontCamera = !STUDIO_STATE.isFrontCamera;
                this.startStream();
            },

            toggleLayout() {
                STUDIO_STATE.activeLayoutMode = (STUDIO_STATE.activeLayoutMode === 'STRIP') ? 'GRID' : 'STRIP';
                document.getElementById('layout-toggle').innerText = `MODE: ${STUDIO_STATE.activeLayoutMode}`;
                document.getElementById('display-date').style.display = (STUDIO_STATE.activeLayoutMode === 'STRIP') ? 'block' : 'none';
            },

            startCaptureCycle() {
                if(STUDIO_STATE.capturedImages.length >= 4 || STUDIO_STATE.isProcessing) return;
                
                STUDIO_STATE.isProcessing = true;
                let count = 3;
                const overlay = document.getElementById('countdown-overlay');
                const number = document.getElementById('countdown-number');
                
                overlay.style.display = 'flex';
                number.innerText = count;

                const timer = setInterval(() => {
                    count--;
                    if(count > 0) {
                        number.innerText = count;
                    } else {
                        clearInterval(timer);
                        overlay.style.display = 'none';
                        this.snapPhoto();
                        STUDIO_STATE.isProcessing = false;
                    }
                }, 1000);
            },

            snapPhoto() {
                // Flash effect
                const flash = document.getElementById('flash-effect');
                flash.classList.add('ani-flash');
                setTimeout(() => flash.classList.remove('ani-flash'), 400);

                const video = document.getElementById('studio-video');
                const canvas = document.getElementById('bridge-canvas');
                const context = canvas.getContext('2d');

                // Resolution
                canvas.width = 1200;
                canvas.height = 1200;

                // --- THE CRITICAL BAKING LOGIC ---
                // We apply the exact studio filter from our library to the canvas buffer
                context.filter = STUDIO_STATE.filterLibrary[STUDIO_STATE.activeFilterKey];

                context.save();
                if(STUDIO_STATE.isFrontCamera) {
                    context.translate(1200, 0);
                    context.scale(-1, 1);
                }

                // Square Crop Logic
                const size = Math.min(video.videoWidth, video.videoHeight);
                const sourceX = (video.videoWidth - size) / 2;
                const sourceY = (video.videoHeight - size) / 2;

                context.drawImage(video, sourceX, sourceY, size, size, 0, 0, 1200, 1200);
                context.restore();

                // Save to state
                STUDIO_STATE.capturedImages.push(canvas.toDataURL('image/jpeg', 0.95));
                
                // Update Button UI
                const btn = document.getElementById('trigger-btn');
                if(STUDIO_STATE.capturedImages.length < 4) {
                    btn.innerText = `TAKE PHOTO ${STUDIO_STATE.capturedImages.length + 1}/4`;
                } else {
                    btn.innerText = "OPENING STUDIO...";
                    setTimeout(() => this.showResults(), 1000);
                }
            },

            showResults() {
                document.getElementById('capture-scene').style.display = 'none';
                document.getElementById('result-stage').style.display = 'flex';
                
                const wrapper = document.getElementById('slideshow-wrapper');
                wrapper.innerHTML = '';
                
                STUDIO_STATE.capturedImages.forEach((data, index) => {
                    const img = document.createElement('img');
                    img.src = data;
                    img.className = 'frame-slide' + (index === 0 ? ' active' : '');
                    img.id = `slide-frame-${index}`;
                    wrapper.appendChild(img);
                });

                // Start Auto Slideshow
                let currentFrame = 0;
                setInterval(() => {
                    document.getElementById(`slide-frame-${currentFrame}`).classList.remove('active');
                    currentFrame = (currentFrame + 1) % 4;
                    document.getElementById(`slide-frame-${currentFrame}`).classList.add('active');
                }, 3000);

                // Start Sticker Cycle
                setInterval(() => {
                    STUDIO_STATE.stickerFrame = (STUDIO_STATE.stickerFrame % 3) + 1;
                    document.getElementById('stk-left').src = `pindah${STUDIO_STATE.stickerFrame}.png`;
                    document.getElementById('stk-right').src = `pindah${STUDIO_STATE.stickerFrame}.png`;
                }, 2500);

                // Set Date
                const now = new Date();
                const dateStr = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
                document.getElementById('display-date').innerText = "DATE: " + dateStr;
            },

            /**
             * HIGH-RESOLUTION ASYNC BAKING ENGINE
             */
            async bakeFinalImage() {
                const overlay = document.getElementById('BAKING-overlay');
                const bar = document.getElementById('BAKING-progress-fill');
                const text = document.getElementById('BAKING-status-text');
                
                overlay.style.display = 'flex';
                
                const finalCanvas = document.createElement('canvas');
                const ctx = finalCanvas.getContext('2d');
                const cardStyle = window.getComputedStyle(document.getElementById('target-polaroid'));
                const bgColor = cardStyle.backgroundColor;
                const textColor = cardStyle.color;

                if(STUDIO_STATE.activeLayoutMode === 'STRIP') {
                    // Ultra High-Res Vertical Strip (1400 x 6000)
                    finalCanvas.width = 1400;
                    finalCanvas.height = 6200;
                    
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                    for(let i=0; i<4; i++) {
                        text.innerText = `BAKING FRAME ${i+1} OF 4...`;
                        bar.style.width = `${(i+1) * 20}%`;
                        
                        const img = new Image();
                        img.src = STUDIO_STATE.capturedImages[i];
                        await new Promise(resolve => img.onload = resolve);
                        
                        // Draw shadow effect for frames
                        ctx.shadowColor = 'rgba(0,0,0,0.1)';
                        ctx.shadowBlur = 30;
                        ctx.drawImage(img, 100, 120 + (i * 1350), 1200, 1200);
                        ctx.shadowBlur = 0; // Reset shadow
                        
                        await new Promise(r => setTimeout(r, 400));
                    }

                    // Draw High-Res Watermark
                    ctx.fillStyle = textColor;
                    ctx.textAlign = "right";
                    ctx.font = "bold 80px 'Plus Jakarta Sans'";
                    ctx.fillText("SwaaFotoes", 1300, 5800);
                    ctx.font = "600 40px 'Plus Jakarta Sans'";
                    ctx.fillStyle = "#c39366";
                    ctx.fillText("STUDIO BY AFGAN", 1300, 5870);

                    ctx.textAlign = "left";
                    ctx.fillStyle = textColor;
                    ctx.font = "600 35px 'Plus Jakarta Sans'";
                    ctx.fillText(document.getElementById('display-date').innerText, 100, 5800);

                } else {
                    // Ultra High-Res Grid (2600 x 3200)
                    finalCanvas.width = 2600;
                    finalCanvas.height = 3200;
                    
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                    for(let i=0; i<4; i++) {
                        text.innerText = `BAKING FRAME ${i+1} OF 4...`;
                        bar.style.width = `${(i+1) * 20}%`;
                        
                        const img = new Image();
                        img.src = STUDIO_STATE.capturedImages[i];
                        await new Promise(resolve => img.onload = resolve);
                        
                        const px = (i % 2) * 1250 + 75;
                        const py = Math.floor(i / 2) * 1250 + 100;
                        
                        ctx.drawImage(img, px, py, 1200, 1200);
                        await new Promise(r => setTimeout(r, 400));
                    }

                    ctx.fillStyle = textColor;
                    ctx.textAlign = "center";
                    ctx.font = "bold 90px 'Plus Jakarta Sans'";
                    ctx.fillText("SwaaFotoes Studio By Afgan", 1300, 2900);
                }

                text.innerText = "OPTIMIZING EXPORT...";
                bar.style.width = "100%";

                setTimeout(() => {
                    const link = document.createElement('a');
                    link.download = `SwaaFotoes_Studio_Afgan_${Date.now()}.jpg`;
                    link.href = finalCanvas.toDataURL('image/jpeg', 0.98);
                    link.click();
                    
                    overlay.style.display = 'none';
                    bar.style.width = "0%";
                }, 1200);
            }
        };

        // RUN ENGINE ON LOAD
        window.onload = () => Engine.startStream();
